<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #0b0c10;
        color: #d7dae0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      main {
        width: 100%;
        max-width: 860px;
      }
      h1 {
        font-size: 1.4rem;
        letter-spacing: 0.04em;
        color: #f2f3f5;
        margin: 0 0 0.4rem;
        text-align: center;
      }
      p.subtitle {
        text-align: center;
        color: #7a7f8a;
        margin: 0 0 2.4rem;
        font-size: 0.95rem;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.4rem;
      }
      a.card {
        display: block;
        text-decoration: none;
        border-radius: 10px;
        padding: 1.6rem;
        border: 1px solid #262a33;
        background: linear-gradient(160deg, #14151a 0%, #0f1013 100%);
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      a.card:hover {
        border-color: #454b58;
        transform: translateY(-2px);
      }
      .tag {
        display: inline-block;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #8a92a3;
        border: 1px solid #333a48;
        border-radius: 4px;
        padding: 0.15rem 0.5rem;
        margin-bottom: 0.9rem;
      }
      .card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
        color: #f2f3f5;
      }
      .card p {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1.5;
        color: #9198a3;
      }
      .card.thrash-margin .tag {
        color: #ff9d7a;
        border-color: #4a3226;
      }
      .card.niccolo .tag {
        color: #e8d5a3;
        border-color: #4a3d28;
      }
      .card.niccolo {
        background: linear-gradient(160deg, #16130d 0%, #0f0d09 100%);
        border-color: #2a2117;
      }
      .card.niccolo:hover {
        border-color: #4a3d28;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Choose a game</h1>
      <p class="subtitle">Two separate builds, one address.</p>
      <div class="cards">
        <a class="card thrash-margin" href="/thrash-margin/">
          <span class="tag">Territory strategy</span>
          <h2>Thrash Margin</h2>
          <p>Settlers-style building meets Risk-style conquest. Expand, conquer, develop.</p>
        </a>
        <a class="card niccolo" href="/niccolo/">
          <span class="tag">Trading &amp; banking</span>
          <h2>Banco di Niccolo</h2>
          <p>Trade, credit and intelligence across 15th-century Europe and the Levant.</p>
        </a>
      </div>
    </main>
  </body>
</html>
